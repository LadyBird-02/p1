<!DOCTYPE html>
<html>

<head>
    <title>Student Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="nav">Placement Portal</div>

    <div class="container">

        <div class="card">

            <h2>Student Registration</h2>

            <input id="student_name" placeholder="Name">
            <input id="roll_no" placeholder="Roll Number">
            <input id="department" placeholder="Department">
            <input id="cgpa" placeholder="CGPA">
            <input id="skills" placeholder="Skills">
            <input id="password" type="password" placeholder="Password">

            <button onclick="registerStudent()">Register</button>

            <p><a href="login.html">Login</a></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
